name: Ingest catalog changes

# On push to main (or manual dispatch):
#   1. POST each changed option_b/projects/*.json to the Worker's /api/ingest.
#   2. Reconcile deletions: delete any ref_number in Atlas that is no longer
#      present in the repo.
#
# The MongoDB driver runs inside the Worker and intermittently throws a
# Cloudflare 1101 under load, so every call is retried a few times.
#
# Required repo secrets:
#   INGEST_URL     Worker base URL (e.g., https://dash-api.<sub>.workers.dev)
#   INGEST_SECRET  Bearer token matching env.INGEST_SECRET on the Worker

on:
  push:
    branches: [main]
    paths:
      - 'option_b/projects/**.json'
      - '.github/workflows/ingest-catalog.yml'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate required secrets
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail
          echo "INGEST_URL length: ${#INGEST_URL}"
          echo "INGEST_SECRET length: ${#INGEST_SECRET}"
          if [ -z "$INGEST_URL" ]; then
            echo "::error::INGEST_URL secret is empty. Set it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_SECRET secret is empty."
            exit 1
          fi
          case "$INGEST_URL" in
            https://*) echo "INGEST_URL: starts with https:// (good)" ;;
            *) echo "::error::INGEST_URL must start with https://. Check for a missing scheme or stray whitespace."; exit 1 ;;
          esac

      - name: Resolve changed JSON files
        id: changed
        run: |
          set -uo pipefail
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'option_b/projects/*.json' || true)
          else
            files=$(ls option_b/projects/*.json 2>/dev/null || true)
          fi
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No JSON files changed under option_b/projects/."
          else
            echo "Will ingest:"; echo "$files"
          fi

      - name: POST each changed file to /api/ingest
        if: steps.changed.outputs.files != ''
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail
          ok=0
          fail=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || { echo "SKIP $file (deleted)"; continue; }
            done_ok=0
            for attempt in 1 2 3 4 5; do
              response=$(curl -sS -w $'\n%{http_code}' \
                -X POST "$INGEST_URL/api/ingest" \
                -H "authorization: Bearer $INGEST_SECRET" \
                -H 'content-type: application/json' \
                --data-binary @"$file" 2>&1) || true
              status=$(printf '%s' "$response" | tail -n1)
              body=$(printf '%s' "$response" | sed '$d')
              if printf '%s' "$status" | grep -qE '^2[0-9][0-9]$'; then
                echo "POST $file ok ($status) $body"
                done_ok=1; break
              fi
              echo "POST $file attempt $attempt -> ${status:-err}; retrying"
              sleep 3
            done
            if [ "$done_ok" -eq 1 ]; then ok=$((ok+1)); else echo "  FAIL $file"; fail=$((fail+1)); fi
          done <<< "${{ steps.changed.outputs.files }}"
          echo "Ingested $ok, failed $fail."
          [ "$fail" -eq 0 ]

      - name: Reconcile deletions (remove Atlas refs not in the repo)
        if: always()
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail
          # Reconcile against the live collection rather than the git diff, so a
          # removed project is deleted no matter which commit dropped it, the
          # step is idempotent/self-healing, and it runs even if some ingests
          # failed (deletion is independent of new-doc ingestion).
          local_refs=$(jq -r '.ref_number // empty' option_b/projects/*.json 2>/dev/null | sort -u)
          if [ -z "$local_refs" ]; then
            echo "::error::no local ref_numbers found; refusing to reconcile (would delete everything)."
            exit 1
          fi
          # List Atlas refs, retried (the Worker's Mongo layer is intermittently flaky).
          atlas_refs=""
          for attempt in 1 2 3 4 5 6; do
            resp=$(curl -sS "$INGEST_URL/api/projects" 2>&1) || true
            atlas_refs=$(printf '%s' "$resp" | jq -r '.refs[]? // empty' 2>/dev/null | sort -u || true)
            [ -n "$atlas_refs" ] && break
            echo "list attempt $attempt: no refs yet; retrying"; sleep 3
          done
          if [ -z "$atlas_refs" ]; then
            echo "::error::could not list Atlas refs after retries"; exit 1
          fi
          to_delete=$(comm -23 <(printf '%s\n' "$atlas_refs") <(printf '%s\n' "$local_refs"))
          if [ -z "$to_delete" ]; then
            echo "Atlas matches the repo; nothing to delete."
            exit 0
          fi
          echo "Refs to delete: $(printf '%s ' $to_delete)"
          fail=0
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            done_ok=0
            for attempt in 1 2 3 4; do
              status=$(curl -sS -o /dev/null -w '%{http_code}' \
                -X DELETE "$INGEST_URL/api/projects/$ref" \
                -H "authorization: Bearer $INGEST_SECRET" 2>/dev/null) || status=000
              if printf '%s' "$status" | grep -qE '^2[0-9][0-9]$'; then
                echo "DELETE $ref ok ($status)"; done_ok=1; break
              fi
              echo "DELETE $ref attempt $attempt -> $status; retrying"; sleep 2
            done
            [ "$done_ok" -eq 1 ] || { echo "  FAILED to delete $ref"; fail=$((fail+1)); }
          done <<< "$to_delete"
          echo "Reconcile-delete done; failures: $fail."
          [ "$fail" -eq 0 ]
