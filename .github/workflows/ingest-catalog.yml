name: Ingest catalog changes

# Detects changed JSON files under option_b/projects/ on push to main and
# POSTs each one to the deployed Worker's /api/ingest endpoint.
#
# Required repo secrets:
#   INGEST_URL     Worker base URL (e.g., https://dash-api.<sub>.workers.dev)
#   INGEST_SECRET  Bearer token matching env.INGEST_SECRET on the Worker

on:
  push:
    branches: [main]
    paths:
      - 'option_b/projects/**.json'
      - '.github/workflows/ingest-catalog.yml'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate required secrets
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail

          # Length checks (won't reveal the values, but tells us if either
          # secret is empty or missing).
          echo "INGEST_URL length: ${#INGEST_URL}"
          echo "INGEST_SECRET length: ${#INGEST_SECRET}"

          if [ -z "$INGEST_URL" ]; then
            echo "::error::INGEST_URL secret is empty. Set it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_SECRET secret is empty."
            exit 1
          fi

          # Format check (does not print the URL itself).
          case "$INGEST_URL" in
            https://*)
              echo "INGEST_URL: starts with https:// (good)"
              ;;
            http://*)
              echo "::error::INGEST_URL starts with http:// (must be https://)."
              exit 1
              ;;
            *)
              echo "::error::INGEST_URL does not start with https://. Check for missing scheme, angle brackets, or stray whitespace."
              exit 1
              ;;
          esac

          # Trailing-slash check (URL construction below appends /api/ingest).
          case "$INGEST_URL" in
            */)
              echo "::warning::INGEST_URL has a trailing slash; will be tolerated but consider removing it."
              ;;
          esac

      - name: Resolve changed JSON files
        id: changed
        run: |
          set -uo pipefail
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'option_b/projects/*.json' || true)
          else
            files=$(ls option_b/projects/*.json 2>/dev/null || true)
          fi
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No JSON files changed under option_b/projects/."
          else
            echo "Will ingest:"
            echo "$files"
          fi

      - name: POST each changed file to /api/ingest
        if: steps.changed.outputs.files != ''
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail
          ok=0
          fail=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ ! -f "$file" ]; then
              echo "SKIP $file (deleted)"
              continue
            fi
            echo "POST $file"

            # Capture curl exit code separately so a connection failure
            # produces a clear message instead of an opaque "exit code 3".
            set +e
            response=$(curl -sS -w $'\n%{http_code}' \
              -X POST "$INGEST_URL/api/ingest" \
              -H "authorization: Bearer $INGEST_SECRET" \
              -H 'content-type: application/json' \
              --data-binary @"$file" 2>&1)
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ]; then
              echo "  FAIL (curl exit $curl_exit)"
              echo "  $response" | sed 's/^/    /'
              case "$curl_exit" in
                3)  echo "  → curl rejected the URL as malformed. Check INGEST_URL." ;;
                6)  echo "  → curl could not resolve the host. Check INGEST_URL." ;;
                7)  echo "  → curl could not connect. The Worker may not be deployed." ;;
                22) echo "  → server returned >=400. See response body above." ;;
              esac
              fail=$((fail+1))
              continue
            fi

            status=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            if [ -z "$status" ]; then
              echo "  FAIL (no status returned)"
              echo "  $body" | sed 's/^/    /'
              fail=$((fail+1))
              continue
            fi
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "  ok ($status) $body"
              ok=$((ok+1))
            else
              echo "  FAIL ($status) $body"
              fail=$((fail+1))
            fi
          done <<< "${{ steps.changed.outputs.files }}"
          echo "Ingested $ok, failed $fail."
          [ "$fail" -eq 0 ]

      - name: Delete removed project JSONs from Atlas
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -uo pipefail
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "No previous commit; skipping delete reconciliation."
            exit 0
          fi
          deleted=$(git diff --name-only --diff-filter=D HEAD~1 HEAD -- 'option_b/projects/*.json' || true)
          if [ -z "$deleted" ]; then
            echo "No deleted project JSONs."
            exit 0
          fi
          # ref_numbers still present in the current catalog. A delete+re-add of
          # the same ref under a different filename must NOT remove the new doc.
          current_refs=$(jq -r '.ref_number // empty' option_b/projects/*.json 2>/dev/null | sort -u)
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # The file is gone at HEAD; read its ref_number from the prior commit.
            ref=$(git show "HEAD~1:$f" | jq -r '.ref_number // empty')
            if [ -z "$ref" ]; then
              echo "SKIP $f (no ref_number in prior version)"
              continue
            fi
            if printf '%s\n' "$current_refs" | grep -qx "$ref"; then
              echo "SKIP ref=$ref (still in current catalog; file renamed/re-added)"
              continue
            fi
            echo "DELETE ref=$ref (from $f)"
            status=$(curl -sS -o /dev/null -w '%{http_code}' \
              -X DELETE "$INGEST_URL/api/projects/$ref" \
              -H "authorization: Bearer $INGEST_SECRET")
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "  ok ($status)"
            else
              echo "  FAIL ($status)"
              fail=$((fail+1))
            fi
          done <<< "$deleted"
          echo "Delete step done; failures: $fail."
          [ "$fail" -eq 0 ]
