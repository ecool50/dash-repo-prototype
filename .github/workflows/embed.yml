name: Embed project records

# Triggered on PRs that touch projects/*.json. For each changed file,
# POST source_text to the Cloudflare Worker (which calls Workers AI
# under the hood), write the returned vector back into the JSON,
# and commit it to the PR branch.
#
# Required vars/secrets:
#   EMBED_URL            - the Worker URL (set as a repo variable, not secret).
#   GITHUB_TOKEN         - provided automatically by Actions.

on:
  pull_request:
    paths:
      - 'projects/**.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Find changed project files
        id: changed
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          files=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- 'projects/*.json')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate against schema_v1.json
        run: |
          npm install --no-save ajv ajv-formats
          node scripts/validate.mjs ${{ steps.changed.outputs.files }}

      - name: Compute embeddings
        env:
          EMBED_URL: ${{ vars.EMBED_URL || 'https://dash-embed-query.ecool50.workers.dev' }}
        run: |
          node scripts/embed.mjs ${{ steps.changed.outputs.files }}

      - name: Commit updated vectors
        run: |
          git config user.name 'dash-bot'
          git config user.email 'dash-bot@users.noreply.github.com'
          if [ -n "$(git status --porcelain projects/)" ]; then
            git add projects/
            git commit -m 'chore: refresh embeddings'
            git push
          else
            echo 'No embedding changes to commit.'
          fi
