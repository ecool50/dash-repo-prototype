name = "dash-api"
main = "worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

# The MongoDB driver + warm connection live in this Durable Object, off the
# stateless request path, to avoid the per-isolate connection crashes (1101).
[[durable_objects.bindings]]
name = "MONGO_DO"
class_name = "MongoDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MongoDO"]

# Comma-separated allowlist of origins permitted to call the API from a
# browser. localhost:5173 is the Vite dev server. Update the first entry
# when the frontend moves to the DASH-owned Cloudflare account.
[vars]
ALLOWED_ORIGIN = "https://dash-frontend.ecool50.workers.dev,http://localhost:5173"

# Secrets (set via `npx wrangler secret put` from this directory):
#   ATLAS_URI        mongodb+srv://user:pass@cluster.mongodb.net/?retryWrites=true&w=majority
#   GEMINI_API_KEY   Google AI Studio key. If set, /api/ask synthesizes answers
#                    with Gemini; if unset, it uses the keyless Workers AI path.
#
# Optional [vars] override:
#   GEMINI_MODEL     defaults to gemini-2.5-flash
